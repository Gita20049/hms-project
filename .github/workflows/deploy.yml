name: Deploy to AWS EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: 44.222.156.21
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/hms-project
            git pull origin master
            pkill -f uvicorn
            nohup python3 -m uvicorn app:app --host 0.0.0.0 --port 8000 &
